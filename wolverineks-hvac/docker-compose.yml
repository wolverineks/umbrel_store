version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: wolverineks-hvac_server_1
      APP_PORT: 3000

  infinitude:
    image: nebulous/infinitude:latest@sha256:0ec76e9ea169d1496b48a4b7b46bded0462829e44fcff6baad53a98dfa9b1c3b
    working_dir: /infinitude
    volumes:
      - ${APP_DATA_DIR}/data/state:/infinitude/state
    environment:
      APP_SECRET: ${APP_PASSWORD:-wolverineks-hvac}
      PASS_REQS: "300"
      MODE: Production
    ports:
      - "4035:3000"
      - "4036:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/Alive | grep -q alive"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: on-failure
    init: true

  server:
    image: node:22-alpine
    user: "1000:1000"
    command: node /app/server.js
    volumes:
      - ${APP_DATA_DIR}/site:/app:ro
      - ${APP_DATA_DIR}/data:/data
    environment:
      HVAC_DATA_DIR: /data
      INFINITUDE_URL: http://wolverineks-hvac_infinitude_1:3000
      PROXY_PORT: "4035"
      NODE_ENV: production
    depends_on:
      infinitude:
        condition: service_healthy
    restart: on-failure
    init: true