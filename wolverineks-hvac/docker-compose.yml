version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: wolverineks-hvac_server_1
      APP_PORT: 3000

  server:
    image: node:22-alpine
    user: "1000:1000"
    command: node /app/server.js
    volumes:
      - ${APP_DATA_DIR}/site:/app:ro
      - ${APP_DATA_DIR}/data:/data
    environment:
      HVAC_DATA_DIR: /data
      NODE_ENV: production
    restart: on-failure
    init: true