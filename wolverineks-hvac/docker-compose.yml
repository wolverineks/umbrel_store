version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: wolverineks-hvac_server_1
      APP_PORT: 3000

  infinitude:
    image: nebulous/infinitude:latest@sha256:0ec76e9ea169d1496b48a4b7b46bded0462829e44fcff6baad53a98dfa9b1c3b
    volumes:
      - ${APP_DATA_DIR}/data/state:/infinitude/state
    environment:
      APP_SECRET: ${APP_PASSWORD}
      PASS_REQS: "300"
      MODE: production
    ports:
      - "4035:3000"
    restart: on-failure
    init: true

  server:
    image: node:22-alpine
    user: "1000:1000"
    command: node /app/server.js
    volumes:
      - ${APP_DATA_DIR}/site:/app:ro
      - ${APP_DATA_DIR}/data:/data
    environment:
      HVAC_DATA_DIR: /data
      INFINITUDE_URL: http://infinitude:3000
      PROXY_PORT: "4035"
      NODE_ENV: production
    depends_on:
      - infinitude
    restart: on-failure
    init: true