manifestVersion: 1
id: wolverineks-hvac
name: Bryant/Carrier HVAC
tagline: Cloud web UI for Bryant Evolution and Carrier Infinity heat pumps
icon: https://raw.githubusercontent.com/wolverineks/umbrel_store/master/wolverineks-hvac/icon.svg
category: automation
version: "2.4.5"
port: 4040
description: >-
  Control your Bryant/Carrier Infinity or Evolution thermostat from Umbrel
  through Carrier's cloud API — the same connection the official mobile app uses.


  Sign in with your Bryant or Carrier account email and password. No thermostat
  IP address or local proxy setup is required.


  Internet access is required. This approach works with newer Connex firmware
  (Series B/C) where local Infinitude proxy setups often fail.
developer: Wolverineks
website: https://github.com/wolverineks
repo: https://github.com/wolverineks/umbrel_store
support: https://github.com/wolverineks/umbrel_store/issues
gallery: []
releaseNotes: >-
  Unified icon-only refresh in the mobile header and page toolbars. Removed
  redundant toolbar subtitles on Schedule, Weather, and Maintenance. Schedule
  and blower dashboard tiles are fully tappable links to their pages.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""