manifestVersion: 1
id: wolverineks-recipes
name: Recipes
tagline: Save and browse recipes from the web
icon: https://raw.githubusercontent.com/wolverineks/umbrel_store/master/wolverineks-recipes/icon.svg
category: files
version: "1.0.45"
port: 4020
description: >-
  A self-hosted recipe library for your Umbrel. Save recipes from the Recipe
  Printer Chrome extension, browse them in a clean library, and keep source links.
developer: Wolverineks
website: https://github.com/wolverineks
repo: https://github.com/wolverineks/umbrel_store
support: https://github.com/wolverineks/umbrel_store/issues
gallery: []
releaseNotes: >-
  Restore fully replaces the live library, rebuilds the index from recipe
  files, and deduplicates by canonical URL and matching content so duplicates
  no longer appear after a restore.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
backupIgnore:
  - data