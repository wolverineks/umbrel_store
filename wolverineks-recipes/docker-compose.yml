version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: wolverineks-recipes_server_1
      APP_PORT: 3000
      PROXY_AUTH_WHITELIST: "/api/ingest"

  server:
    image: node:22-alpine
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /data/recipes
        chown -R 1000:1000 /data
        exec su -s /bin/sh node -c "node /app/server.js"
    volumes:
      - ${APP_DATA_DIR}/site:/app:ro
      - ${APP_DATA_DIR}/data:/data
    environment:
      RECIPES_DATA_DIR: /data
      NODE_ENV: production
    restart: on-failure
    init: true