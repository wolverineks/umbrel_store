# Local UI development — faster iteration than the Umbrel deployment.
# From wolverineks-nbu-dashboard/: docker compose -f docker-compose.dev.yml up
version: "3.7"

services:
  server:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev:local"
    ports:
      - "4060:4060"
    volumes:
      - ./site:/app
    environment:
      NBU_DEV: "1"
      NBU_DATA_DIR: /app/.local-data
      PORT: "4060"
    init: true