manifestVersion: 1
id: wolverineks-storich
name: Storich
tagline: Self-hosted cloud storage for your files
icon: https://raw.githubusercontent.com/wolverineks/umbrel_store/master/wolverineks-storich/icon.svg
category: files
version: "1.1.0"
port: 4010
description: >-
  A minimal self-hosted drive for your Umbrel. Store, browse, upload, and download
  files from your own private cloud, similar to how Immich mirrors Google Photos.
developer: Wolverineks
website: https://github.com/wolverineks
repo: https://github.com/wolverineks/umbrel_store
support: https://github.com/wolverineks/umbrel_store/issues
gallery: []
releaseNotes: >-
  Simple v1 sync between two instances: configure a remote URL and shared token,
  then use Sync now to copy newer files both ways. Deletes are not synced yet.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""